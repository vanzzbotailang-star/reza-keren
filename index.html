<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapTik - TikTok Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-grad {
            background: linear-gradient(to right, #ff0050, #00f2ea);
            transition: 0.3s ease;
        }
        .btn-grad:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 242, 234, 0.4);
        }
    </style>
</head>
<body class="text-white font-sans">

    <div class="container mx-auto px-4 py-12 flex flex-col items-center">
        <header class="text-center mb-10 animate__animated animate__fadeInDown">
            <h1 class="text-5xl font-extrabold mb-2 tracking-tight">
                Snap<span class="text-cyan-400">Tik</span>
            </h1>
            <p class="text-gray-400">Download TikTok Video Tanpa Watermark secara Gratis</p>
        </header>

        <div class="w-full max-w-2xl glass p-8 rounded-3xl shadow-2xl animate__animated animate__zoomIn">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="videoUrl" 
                    placeholder="Tempel tautan TikTok di sini..." 
                    class="flex-1 p-4 rounded-xl bg-gray-800 border border-gray-700 focus:outline-none focus:border-cyan-400 transition-all text-white">
                
                <button onclick="downloadVideo()" id="btnDownload" class="btn-grad px-8 py-4 rounded-xl font-bold uppercase tracking-wider flex items-center justify-center gap-2">
                    <i class="fas fa-download"></i> Download
                </button>
            </div>
            
            <div id="loader" class="hidden mt-6 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-cyan-400"></div>
                <p class="mt-2 text-sm text-cyan-400">Sedang memproses...</p>
            </div>
        </div>

        <div id="result" class="hidden mt-10 w-full max-w-2xl glass p-6 rounded-3xl animate__animated animate__fadeInUp">
            <div class="flex flex-col md:flex-row gap-6">
                <img id="videoThumb" src="" class="w-full md:w-48 rounded-2xl shadow-lg border border-gray-700" alt="Thumbnail">
                <div class="flex-1">
                    <h3 id="videoTitle" class="text-xl font-bold mb-2 line-clamp-2">Judul Video</h3>
                    <p id="videoAuthor" class="text-sm text-gray-400 mb-4">@username</p>
                    
                    <div class="grid grid-cols-1 gap-3">
                        <a id="linkNoWm" href="#" target="_blank" class="bg-green-600 hover:bg-green-500 p-3 rounded-lg text-center font-semibold transition-all flex items-center justify-center gap-2">
                            <i class="fas fa-film"></i> Video (No Watermark)
                        </a>
                        <a id="linkMusic" href="#" target="_blank" class="bg-gray-700 hover:bg-gray-600 p-3 rounded-lg text-center font-semibold transition-all flex items-center justify-center gap-2">
                            <i class="fas fa-music"></i> Download MP3
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function downloadVideo() {
            const urlInput = document.getElementById('videoUrl').value;
            const btn = document.getElementById('btnDownload');
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('result');

            if (!urlInput) return alert('Masukkan URL TikTok!');

            // UI State: Loading
            loader.classList.remove('hidden');
            resultDiv.classList.add('hidden');
            btn.disabled = true;
            btn.style.opacity = '0.5';

            try {
                // Memanggil API TikWM
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(urlInput)}`);
                const data = await response.json();

                if (data.code === 0) {
                    const videoData = data.data;

                    // Update UI dengan data API
                    document.getElementById('videoThumb').src = videoData.cover;
                    document.getElementById('videoTitle').innerText = videoData.title || "TikTok Video";
                    document.getElementById('videoAuthor').innerText = `@${videoData.author.unique_id}`;
                    document.getElementById('linkNoWm').href = `https://www.tikwm.com${videoData.play}`;
                    document.getElementById('linkMusic').href = `https://www.tikwm.com${videoData.music}`;

                    // Tampilkan Hasil
                    resultDiv.classList.remove('hidden');
                } else {
                    alert('Gagal mengambil data. Pastikan link benar.');
                }
            } catch (error) {
                console.error(error);
                alert('Terjadi kesalahan koneksi.');
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
